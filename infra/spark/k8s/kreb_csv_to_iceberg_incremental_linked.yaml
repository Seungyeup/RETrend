apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: kreb-csv-to-iceberg-incremental-linked
  namespace: kubeflow
spec:
  type: Python
  mode: cluster
  image: dave126/spark-py-s3a-iceberg:3.3.2
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/app/kreb_csv_to_iceberg_incremental.py
  sparkVersion: 3.3.1
  restartPolicy:
    type: Never

  deps:
    packages:
      - org.apache.spark:spark-hadoop-cloud_2.12:3.3.1
      - org.apache.hadoop:hadoop-aws:3.3.4
      - com.amazonaws:aws-java-sdk-bundle:1.12.262
      - io.openlineage:openlineage-spark_2.12:1.30.1

  sparkConf:
    spark.app.name: kreb_csv_to_iceberg_incremental_linked
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.iceberg: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.iceberg.type: hive
    spark.sql.catalog.iceberg.uri: thrift://172.30.1.30:9083
    spark.sql.catalog.iceberg.warehouse: s3a://retrend-raw-data/warehouse/iceberg

    spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.endpoint: http://172.30.1.28:9000
    spark.hadoop.fs.s3a.access.key: minioadmin
    spark.hadoop.fs.s3a.secret.key: minioadmin
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.connection.ssl.enabled: "false"

    spark.jars.ivy: /tmp/.ivy
    spark.extraListeners: io.openlineage.spark.agent.OpenLineageSparkListener
    spark.openlineage.transport.type: http
    spark.openlineage.transport.url: http://marquez.openlineage.svc.cluster.local:5000
    spark.openlineage.transport.endpoint: /api/v1/lineage
    spark.openlineage.namespace: retrend
    spark.openlineage.dataset.removePath.pattern: "(?<remove>/LAWD_CD=[^/]+/DEAL_YM=[^/]+.*)"

  driver:
    coreRequest: "500m"
    coreLimit: "1000m"
    cores: 1
    memory: 2g
    serviceAccount: spark
    env:
      - name: HIVE_METASTORE_URI
        value: thrift://172.30.1.30:9083
      - name: BRONZE_PREFIX
        value: s3a://retrend-raw-data/bronze/kreb_etl_v2/apt_trade
      - name: ICEBERG_TABLE
        value: iceberg.default.apt_trade
      - name: WAREHOUSE_BASE
        value: s3a://retrend-raw-data/warehouse/iceberg
      - name: KREB_DAILY_SYNC_MANIFEST_PATH
        value: s3a://retrend-raw-data/bronze/kreb_etl_v2/apt_trade/_manifests/daily_sync/latest.json
      - name: AWS_ACCESS_KEY_ID
        value: minioadmin
      - name: AWS_SECRET_ACCESS_KEY
        value: minioadmin
      - name: RECREATE_TABLE
        value: "false"
    volumeMounts:
      - name: app
        mountPath: /opt/spark/app

  executor:
    instances: 1
    coreRequest: "500m"
    coreLimit: "1000m"
    cores: 1
    memory: 2g
    env:
      - name: AWS_ACCESS_KEY_ID
        value: minioadmin
      - name: AWS_SECRET_ACCESS_KEY
        value: minioadmin
    volumeMounts:
      - name: app
        mountPath: /opt/spark/app

  volumes:
    - name: app
      configMap:
        name: kreb-csv-to-iceberg-incremental-app

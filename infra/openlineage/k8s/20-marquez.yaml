apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez
  namespace: openlineage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marquez
  template:
    metadata:
      labels:
        app: marquez
    spec:
      containers:
        - name: marquez
          image: marquezproject/marquez:0.50.0
          ports:
            - containerPort: 5000
          env:
            - name: MARQUEZ_PORT
              value: "5000"
            - name: POSTGRES_HOST
              value: marquez-postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: SEARCH_ENABLED
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: marquez
  namespace: openlineage
spec:
  selector:
    app: marquez
  ports:
    - name: http
      port: 5000
      targetPort: 5000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: marquez-web
  namespace: openlineage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marquez-web
  template:
    metadata:
      labels:
        app: marquez-web
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: marquez-web
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: marquez-web
                topologyKey: kubernetes.io/hostname
      containers:
        - name: marquez-web
          image: marquezproject/marquez-web:0.50.0
          ports:
            - containerPort: 3000
          env:
            - name: MARQUEZ_HOST
              value: marquez.openlineage.svc.cluster.local
            - name: MARQUEZ_PORT
              value: "5000"
            - name: WEB_PORT
              value: "3000"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "192Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: marquez-web
  namespace: openlineage
spec:
  selector:
    app: marquez-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
